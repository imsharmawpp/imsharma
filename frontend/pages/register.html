<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - VastuKundali</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="logo">
                <span class="logo-icon">🏛️</span>
                <span class="logo-text">Vastu<span class="gold">Kundali</span></span>
            </a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="store.html">Store</a>
                <a href="login.html" class="btn-nav-login">Login</a>
            </div>
        </div>
    </nav>

    <section class="auth-page">
        <div class="auth-card">
            <a href="../index.html" class="logo">
                <span class="logo-icon">🏛️</span>
                <span class="logo-text">Vastu<span class="gold">Kundali</span></span>
            </a>
            <h1>Create Your Account</h1>
            <p class="auth-subtitle">Join 50,000+ homeowners on their Vastu journey</p>

            <div class="social-login">
                <button onclick="socialSignup('google')"><i class="fab fa-google" style="color:#DB4437;"></i> Google</button>
                <button onclick="socialSignup('phone')"><i class="fas fa-phone" style="color:var(--gold-dark);"></i> Phone OTP</button>
            </div>

            <div class="auth-divider">or sign up with email</div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="Rajesh Kumar">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" required pattern="[0-9]{10}" placeholder="9876543210">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required minlength="6" placeholder="Min 6 characters">
                </div>
                <div style="font-size:13px;color:var(--gray-600);margin-bottom:20px;">
                    By signing up, you agree to our <a href="#" style="color:var(--gold-dark);">Terms</a> and <a href="#" style="color:var(--gold-dark);">Privacy Policy</a>.
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </section>

    <script src="../js/main.js"></script>
    <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

        const formData = new FormData(e.target);
        const payload = {
            name: formData.get('name'),
            email: formData.get('email'),
            phone: formData.get('phone'),
            password: formData.get('password')
        };

        try {
            const res = await fetch('../../backend/api/auth_register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (data.success) {
                vastuAuth.login(data.token, data.user);
                showToast('Account created successfully!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                showToast(data.message || 'Registration failed', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        } catch (err) {
            showToast('Connection error. Please try again.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        }
    });

    function socialSignup(provider) {
        showToast(`${provider} signup coming soon!`, 'info');
    }
    </script>
</body>
</html>
